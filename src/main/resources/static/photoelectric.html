<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConceptCanvas - Photoelectric Effect</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdn.plot.ly/plotly-2.35.2.min.js" charset="utf-8"></script>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen p-8">
    <div class="max-w-6xl mx-auto space-y-8">
        <header class="border-b border-slate-700 pb-4 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-extrabold tracking-tight text-green-400">ConceptCanvas</h1>
                <p class="text-slate-400 text-sm">Interactive STEM Tutor: Photoelectric Effect Sandbox</p>
            </div>
            <a href="/" class="text-xs bg-slate-800 hover:bg-slate-700 border border-slate-700 text-slate-300 px-3 py-1.5 rounded-lg transition">
                &larr; Back to Menu
            </a>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- Left Controls -->
            <div class="bg-slate-800 p-6 rounded-xl border border-slate-700 space-y-6">
                <h2 class="text-xl font-bold text-slate-200">Simulation Variables</h2>
                
                <!-- Wavelength -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-slate-300 flex justify-between">
                        <span>Incident Wavelength (λ)</span>
                        <span id="waveVal" class="text-indigo-400 font-mono">200 nm</span>
                    </label>
                    <input type="range" id="wavelength" min="100" max="700" value="200" 
                           class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                </div>

                <!-- Work Function Slider / Preset Selector -->
                <div class="space-y-2">
                    <label class="block text-sm font-medium text-slate-300 flex justify-between">
                        <span>Target Metal Work Function (Φ)</span>
                        <span id="workVal" class="text-indigo-400 font-mono">2.30 eV (Na)</span>
                    </label>
                    <input type="range" id="workFunction" min="1.0" max="6.0" step="0.1" value="2.3" 
                           class="w-full h-2 bg-slate-700 rounded-lg appearance-none cursor-pointer accent-indigo-500">
                </div>

                <div class="border-t border-slate-700 pt-4">
                    <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">Live Math Data</h3>
                    <p id="mathExplanation" class="text-xs text-slate-300 mt-2 italic bg-slate-900/50 p-3 rounded border border-slate-700/50">
                        Calculating parameters...
                    </p>
                </div>

                <!-- AI Chat Section -->
                <div class="border-t border-slate-700 pt-4 space-y-3">
                    <h3 class="text-sm font-semibold text-slate-400 uppercase tracking-wider">AI Physics Tutor</h3>
                    <div id="chatHistory" class="h-40 bg-slate-900/80 rounded border border-slate-700/50 p-3 text-xs overflow-y-auto space-y-2">
                        <div class="text-indigo-400 font-semibold">Tutor:</div>
                        <div class="text-slate-300">Welcome to quantum physics! Ask me how photon frequency impacts electron kinetic energy.</div>
                    </div>
                    <div class="flex gap-2">
                        <input type="text" id="chatInput" placeholder="Ask a question..." 
                               class="flex-1 bg-slate-900 border border-slate-700 rounded px-3 py-1.5 text-xs text-slate-100 focus:outline-none focus:border-indigo-500">
                        <button id="sendBtn" class="bg-indigo-600 hover:bg-indigo-500 text-white font-semibold px-4 py-1.5 text-xs rounded transition">
                            Ask
                        </button>
                    </div>
                </div>
            </div>

            <!-- Right Visualizer -->
            <div class="md:col-span-2 bg-slate-800 p-6 rounded-xl border border-slate-700 flex flex-col justify-between">
                <h2 class="text-xl font-bold text-slate-200 mb-4">Kinetic Energy vs. Frequency Graph</h2>
                <div id="plotContainer" class="w-full h-96 bg-slate-900 rounded-lg overflow-hidden"></div>
            </div>
        </div>
    </div>

    <script src="/js/photoelectric.js"></script>
</body>
</html>
